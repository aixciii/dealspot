<!DOCTYPE html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DealSpot – Bratislava</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #F8FAFC; font-family: 'DM Sans', sans-serif; }
      ::-webkit-scrollbar { display: none; }
      input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 4px; outline: none; cursor: pointer; }
      @keyframes ping { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(2.2);opacity:0} }
      @keyframes slideUp { from{transform:translateY(120px);opacity:0} to{transform:translateY(0);opacity:1} }
    </style>
  </head>
